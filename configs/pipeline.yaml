project:
  name: alphafold-vs-pipeline
  version: v0.2.0

reproducibility:
  random_seed: 42
  run_name: demo_run

target:
  name: SARS-CoV-2 Mpro
  pdb_id: 6LU7
  structure_source: provided
  structure_path: data/raw/6LU7.pdb
  predictor: colabfold

pocket_detection:
  method: predefined
  top_n: 1
  predefined_boxes:
    - id: P1
      source: catalytic_site
      center: [ -10.5, 12.8, 68.3 ]
      size: [ 20.0, 20.0, 20.0 ]

library:
  input_csv: data/benchmark/demo_benchmark.csv
  smiles_column: smiles
  id_column: compound_id
  label_column: label
  max_compounds: 500
  generate_3d: true

benchmark:
  enabled: true
  dataset_name: demo_benchmark

docking:
  engine: vina
  executable: vina
  exhaustiveness: 8
  num_modes: 10
  cpu: 2
  protein_pdbqt: null
  keep_poses: true

rescoring:
  model_type: lightgbm
  train_fraction: 0.8
  cv_folds: 5
  class_weight: balanced
  save_model_path: models/lightgbm_rescorer.joblib
  perform_shap: true

admet:
  apply_filters: true
  max_mw: 500
  max_logp: 5
  max_hbd: 5
  max_hba: 10
  max_tpsa: 140
  max_rotatable_bonds: 10
  max_violations: 1

ranking:
  top_k: 100
  export_csv: true
  export_sdf: true
